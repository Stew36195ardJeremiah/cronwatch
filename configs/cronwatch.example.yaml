# cronwatch example configuration
# Copy to cronwatch.yaml and adjust to your environment.

log_level: info          # debug | info | warn | error
state_file: /var/lib/cronwatch/state.json

smtp:
  host: smtp.example.com
  port: 587
  username: alerts@example.com
  password: "s3cr3t"
  from: cronwatch@example.com

jobs:
  # Daily database backup — must finish within 45 minutes.
  - name: db-backup
    schedule: "0 2 * * *"       # cron expression (UTC)
    max_duration: 45m
    drift_threshold: 10m        # alert if job starts >10m late
    alert_email: ops@example.com

  # Hourly log rotation — lightweight, should finish in under 2 minutes.
  - name: log-rotate
    schedule: "0 * * * *"
    max_duration: 2m
    drift_threshold: 3m
    alert_email: ops@example.com

  # Weekly report generation.
  - name: weekly-report
    schedule: "0 6 * * 1"       # Every Monday at 06:00 UTC
    max_duration: 1h
    drift_threshold: 15m
    alert_email: reports@example.com
