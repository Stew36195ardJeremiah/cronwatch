# cronwatch example configuration

alerts:
  # Log notifier is always active.
  # Uncomment and fill in to enable Slack alerts.
  # slack:
  #   webhook_url: "https://hooks.slack.com/services/XXX/YYY/ZZZ"

  # Uncomment and fill in to enable PagerDuty alerts.
  # pagerduty:
  #   integration_key: "your-pagerduty-integration-key"

jobs:
  - name: daily-backup
    schedule: "0 2 * * *"   # every day at 02:00
    timeout: 30m
    drift_threshold: 10m
    # Optional: command to run. If omitted, cronwatch only monitors execution.
    # command: "/usr/local/bin/backup.sh"

  - name: hourly-sync
    schedule: "0 * * * *"   # every hour
    timeout: 5m
    drift_threshold: 2m
    # command: "/usr/local/bin/sync.sh"

  - name: weekly-report
    schedule: "0 9 * * 1"   # every Monday at 09:00
    timeout: 1h
    drift_threshold: 15m
    # command: "/usr/local/bin/report.sh"
